<!DOCTYPE html>
<html>
<head>
    <title>My QR Website</title>
    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            padding-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            background-color: white;
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ddd;
        }
    </style>
</head>

<body>

    <h1>Welcome 🎉</h1>
    <p>You opened this website using a QR Code!</p>

    <button onclick="showMessage()">Click Me</button>

    <script>
        function showMessage() {
            alert("Website is working perfectly ✅");
        }
    </script>

</body>
</html>
